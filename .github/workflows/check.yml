name: Check kuku mail

on:
  schedule:
    - cron: "*/5 * * * *"  # 5分ごと
  workflow_dispatch:       # 手動実行も可能

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: コード取得
        uses: actions/checkout@v4

      - name: Pythonセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: ライブラリインストール
        run: pip install -r requirements.txt

      - name: 実行
        run: python check.py
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
